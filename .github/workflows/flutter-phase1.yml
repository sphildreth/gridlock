name: Flutter Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out Decent Bench
        uses: actions/checkout@v6

      - name: Set up Flutter
        uses: subosito/flutter-action@v2.21.0
        with:
          channel: stable
          cache: true

      - name: Install Linux build and test dependencies
        run: sudo apt-get update && sudo apt-get install --yes clang cmake ninja-build pkg-config libgtk-3-dev libreoffice-calc xvfb

      - name: Set up Nim
        uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: stable

      - name: Resolve locked DecentDB version
        id: decentdb-version
        shell: bash
        run: |
          set -euo pipefail
          version="$(python3 - <<'PY'
          from pathlib import Path

          lines = Path("apps/decent-bench/pubspec.lock").read_text().splitlines()
          inside = False
          for line in lines:
              if line.startswith("  decentdb:"):
                  inside = True
                  continue
              if inside and line.startswith("  ") and not line.startswith("    "):
                  break
              if inside and line.strip().startswith("version: "):
                  print(line.split('"')[1])
                  raise SystemExit(0)
          raise SystemExit("decentdb version not found in apps/decent-bench/pubspec.lock")
          PY
          )"
          tag="v${version}"
          git ls-remote --tags --refs https://github.com/sphildreth/decentdb.git "${tag}" | grep -q .
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Check out DecentDB ${{ steps.decentdb-version.outputs.tag }}
        run: git clone --depth 1 --branch "${{ steps.decentdb-version.outputs.tag }}" https://github.com/sphildreth/decentdb.git ../decentdb

      - name: Build libpg_query (Linux)
        working-directory: ../decentdb
        shell: bash
        run: |
          if [ ! -d "/tmp/libpg_query" ]; then
            git clone --depth 1 https://github.com/pganalyze/libpg_query.git /tmp/libpg_query
            make -C /tmp/libpg_query
          fi
          mkdir -p build/lib
          cp /tmp/libpg_query/libpg_query.a build/lib/

      - name: Install DecentDB Nim dependencies
        working-directory: ../decentdb
        run: nimble setup -y

      - name: Build DecentDB native library
        working-directory: ../decentdb
        shell: bash
        run: nimble build_lib

      - name: Flutter pub get
        working-directory: apps/decent-bench
        run: flutter pub get

      - name: Flutter analyze
        working-directory: apps/decent-bench
        run: flutter analyze

      - name: Flutter test
        working-directory: apps/decent-bench
        env:
          DECENTDB_NATIVE_LIB: ${{ github.workspace }}/../decentdb/build/libc_api.so
        run: flutter test

      - name: Flutter integration test
        working-directory: apps/decent-bench
        env:
          DECENTDB_NATIVE_LIB: ${{ github.workspace }}/../decentdb/build/libc_api.so
        run: xvfb-run -a flutter test integration_test

  desktop-package-verify:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            flutter_target: linux
            bundle_path: build/linux/x64/release/bundle
            native_lib: ../../../decentdb/build/libc_api.so
          - os: macos-latest
            flutter_target: macos
            bundle_path: build/macos/Build/Products/Release/decent_bench.app
            native_lib: ../../../decentdb/build/libc_api.dylib
          - os: windows-latest
            flutter_target: windows
            bundle_path: build/windows/x64/runner/Release
            native_lib: ../../../decentdb/build/c_api.dll

    steps:
      - name: Check out Decent Bench
        uses: actions/checkout@v6

      - name: Set up Flutter
        uses: subosito/flutter-action@v2.21.0
        with:
          channel: stable
          cache: true

      - name: Install Linux desktop build dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install --yes clang cmake ninja-build pkg-config libgtk-3-dev

      - name: Set up Nim
        uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: stable

      - name: Resolve locked DecentDB version
        id: decentdb-version
        shell: bash
        run: |
          set -euo pipefail
          version="$(python3 - <<'PY'
          from pathlib import Path

          lines = Path("apps/decent-bench/pubspec.lock").read_text().splitlines()
          inside = False
          for line in lines:
              if line.startswith("  decentdb:"):
                  inside = True
                  continue
              if inside and line.startswith("  ") and not line.startswith("    "):
                  break
              if inside and line.strip().startswith("version: "):
                  print(line.split('"')[1])
                  raise SystemExit(0)
          raise SystemExit("decentdb version not found in apps/decent-bench/pubspec.lock")
          PY
          )"
          tag="v${version}"
          git ls-remote --tags --refs https://github.com/sphildreth/decentdb.git "${tag}" | grep -q .
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Check out DecentDB ${{ steps.decentdb-version.outputs.tag }}
        run: git clone --depth 1 --branch "${{ steps.decentdb-version.outputs.tag }}" https://github.com/sphildreth/decentdb.git ../decentdb

      - name: Build libpg_query (Linux)
        if: runner.os == 'Linux'
        working-directory: ../decentdb
        shell: bash
        run: |
          if [ ! -d "/tmp/libpg_query" ]; then
            git clone --depth 1 https://github.com/pganalyze/libpg_query.git /tmp/libpg_query
            make -C /tmp/libpg_query
          fi
          mkdir -p build/lib
          cp /tmp/libpg_query/libpg_query.a build/lib/

      - name: Build libpg_query (macOS)
        if: runner.os == 'macOS'
        working-directory: ../decentdb
        shell: bash
        run: |
          if [ ! -d "/tmp/libpg_query" ]; then
            git clone --depth 1 https://github.com/pganalyze/libpg_query.git /tmp/libpg_query
            make -C /tmp/libpg_query
          fi
          mkdir -p build/lib
          cp /tmp/libpg_query/libpg_query.a build/lib/

      - name: Build libpg_query (Windows)
        if: runner.os == 'Windows'
        working-directory: ../decentdb
        shell: bash
        run: |
          repo_root="$PWD"
          if [ ! -d "/tmp/libpg_query" ]; then
            git clone --depth 1 https://github.com/pganalyze/libpg_query.git /tmp/libpg_query
            cd /tmp/libpg_query
            make
          fi
          cd /tmp/libpg_query
          mkdir -p "$repo_root/build/lib"
          cp libpg_query.a "$repo_root/build/lib/"

      - name: Install DecentDB Nim dependencies
        working-directory: ../decentdb
        run: nimble setup -y

      - name: Build DecentDB native library
        working-directory: ../decentdb
        shell: bash
        run: nimble build_lib

      - name: Flutter pub get
        working-directory: apps/decent-bench
        run: flutter pub get

      - name: Flutter build ${{ matrix.flutter_target }}
        working-directory: apps/decent-bench
        run: flutter build ${{ matrix.flutter_target }}

      - name: Stage DecentDB native library into bundle
        working-directory: apps/decent-bench
        run: dart run tool/stage_decentdb_native.dart --bundle "${{ matrix.bundle_path }}" --source "${{ matrix.native_lib }}"

      - name: Verify bundled native library
        working-directory: apps/decent-bench
        run: dart run tool/stage_decentdb_native.dart --bundle "${{ matrix.bundle_path }}" --verify-only
